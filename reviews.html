    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="index.html" class="nav-logo" id="nav-logo">
                    <span class="logo-emoji">🏛️</span>
                    <span class="logo-text">K-Culture Explorer</span>
                </a>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="index.html" class="nav-link">홈</a>
                <a href="index.html#values" class="nav-link">핵심 가치</a>

                <a href="planner.html" class="nav-link">AI 루트 플래너</a>
            </div>
            <button class="nav-hamburger" id="navHamburger" aria-label="메뉴">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="quick-nav-bar">
        <a href="index.html#services" class="btn-back-home">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            전체 서비스 목록으로
        </a>

    <!-- 탐방 후기 섹션 -->
    <section class="reviews-section" id="reviews">
        <div class="section-container">
            <div class="section-header">
                <span class="section-tag">Travel Reviews</span>
                <h2 class="section-title">탐방 후기</h2>
                <p class="section-desc">다른 여행자들의 생생한 탐방 경험을 확인하세요</p>
            </div>

            <div class="reviews-toolbar">
                <div class="review-tabs">
                    <button class="review-tab active" data-filter="all">전체</button>
                    <button class="review-tab" data-filter="popular">인기순</button>
                    <button class="review-tab" data-filter="recent">최신순</button>
                </div>
                <button class="btn btn-write-review" id="writeReviewBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    후기 작성
                </button>
            </div>

            <div class="reviews-grid" id="reviewsGrid">
                <!-- JS로 동적 생성 -->
            </div>
        </div>
    </section>

    

    
    </div>

    <!-- 후기 작성 모달 -->
    <div class="modal-overlay" id="reviewModalOverlay">
        <div class="modal review-modal" id="reviewModal">
            <button class="modal-close" id="reviewModalClose" aria-label="닫기">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <div class="modal-body">
                <h2 class="modal-title">📝 탐방 후기 작성</h2>
                <form id="reviewForm">
                    <div class="form-group">
                        <label>방문한 곳</label>
                        <select id="reviewSite" class="setting-select" required>
                            <option value="">선택하세요</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>닉네임</label>
                        <input type="text" id="reviewAuthor" class="form-input" placeholder="닉네임을 입력하세요" required>
                    </div>
                    <div class="form-group">
                        <label>평점</label>
                        <div class="star-rating" id="starRating">
                            <span class="star" data-rating="1">★</span>
                            <span class="star" data-rating="2">★</span>
                            <span class="star" data-rating="3">★</span>
                            <span class="star" data-rating="4">★</span>
                            <span class="star" data-rating="5">★</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>제목</label>
                        <input type="text" id="reviewTitle" class="form-input" placeholder="후기 제목" required>
                    </div>
                    <div class="form-group">
                        <label>내용</label>
                        <textarea id="reviewContent" class="form-textarea" placeholder="탐방 경험을 자유롭게 작성해주세요" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">후기 등록하기</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 푸터 -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">
                <span>🏛️</span> K-Culture Explorer
            </div>
            <p>한국의 아름다운 문화유산을 AI와 함께 탐험하세요</p>
            <p class="footer-copy">© 2026 K-Culture Explorer. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
